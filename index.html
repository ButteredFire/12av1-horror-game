<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>json backshot simulator</title>
    <link rel="stylesheet" href="./src/style.css">
  </head>


  <!-- Login-->
  <body style="color: white; font-family: sans-serif;">
    <div id="login-screen">
      <h2>The Boys of 12AV1 Present:</h2>
      <h1>JASON BACKSHOT SIMULATOR 9000</h1>
      <h3>enter your name gng</h3>
      <input type="text" id="username-input" maxlength="30" style="padding: 10px; font-size: 20px;" />
      <button id="start-button" style="margin-top: 20px; padding: 10px 40px; cursor: pointer;">LESSSGO</button>
    </div>


    <!-- Player & game telemetry data-->
    <div id="telemetry">
      <h3>Server: <span id="server-joined"></span></h3>
      <h3>Position: <span id="player-pos"></span></h3>
    </div>


    <!-- Mobile controls -->
    <script type="module" src="/src/main.js"></script>
    <div id="joystick-zone" style="position: absolute; bottom: 0; left: 0; width: 20%; height: 20%; z-index: 10;"></div>


    <!-- Disconnect overlay -->
    <div id="disconnect-overlay" class="visible">
      <img src="./public/disconnect-img.jpg" style="max-height: 40vh;"/>
      <h1>Lost Connection To Server</h1>
      <h2 style="margin: 0;">idk gng, js wait here while the client tries to reconnect</h2>
      <p id="disconnect-log" style="font-family: monospace;"></p>
      <p style="margin: 0;"> <!-- Empty <p> for the sole purpose of padding -->
        <div class="loader">
          <span></span><span></span><span></span>
        </div>
      </p>
    </div>


    <script>
      const disconnectOverlay = document.getElementById("disconnect-overlay");
      disconnectOverlay.classList.remove("visible");
      disconnectOverlay.style.display = "none";
    </script>
  </body>

</html>
